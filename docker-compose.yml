version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: motoya_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: motoya
      POSTGRES_PASSWORD: motoya_secret
      POSTGRES_DB: motoya_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U motoya -d motoya_dev']
      interval: 10s
      timeout: 5s
      retries: 5

  db_test:
    image: postgres:15-alpine
    container_name: motoya_db_test
    restart: unless-stopped
    environment:
      POSTGRES_USER: motoya
      POSTGRES_PASSWORD: motoya_secret
      POSTGRES_DB: motoya_test
    ports:
      - '5433:5432'

volumes:
  postgres_data:
