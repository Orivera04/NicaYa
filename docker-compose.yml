services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: motoya
      POSTGRES_PASSWORD: motoya
      POSTGRES_DB: motoya
    ports: ["5432:5432"]
    volumes: ["motoya-postgres:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U motoya -d motoya"]
      interval: 5s
      timeout: 5s
      retries: 10
volumes:
  motoya-postgres:
